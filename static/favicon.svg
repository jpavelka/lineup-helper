<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32">
  <!-- Field background -->
  <rect width="32" height="32" rx="4" fill="#15803d"/>
  <!-- Field outline -->
  <rect x="3" y="5" width="26" height="22" rx="1" fill="none" stroke="white" stroke-width="1.2"/>
  <!-- Center line -->
  <line x1="16" y1="5" x2="16" y2="27" stroke="white" stroke-width="1.2"/>
  <!-- Center circle -->
  <circle cx="16" cy="16" r="4" fill="none" stroke="white" stroke-width="1.2"/>
  <!-- Center dot -->
  <circle cx="16" cy="16" r="1" fill="white"/>
  <!-- Left penalty box -->
  <rect x="3" y="10" width="6" height="12" fill="none" stroke="white" stroke-width="1.2"/>
  <!-- Right penalty box -->
  <rect x="23" y="10" width="6" height="12" fill="none" stroke="white" stroke-width="1.2"/>
</svg>
